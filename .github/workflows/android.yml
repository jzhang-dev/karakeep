name: Android Build (Local)

on:
  push:
    tags:
      - 'android/v*.*.*'
  workflow_dispatch:
    inputs:
      variant:
        description: 'Build variant (debug or release)'
        required: true
        default: 'release'
        type: choice
        options:
          - debug
          - release

jobs:
  build-android:
    name: Build Android APK (${{ github.event_name == 'workflow_dispatch' && inputs.variant || 'release' }})
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install PNPM
        run: |
          npm install -g pnpm@9
          echo "$(npm bin -g)" >> $GITHUB_PATH
          pnpm --version

      - name: Install dependencies
        run: pnpm install --ignore-scripts
        env:
          PUPPETEER_SKIP_DOWNLOAD: 'true'
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 'true'
          NPM_CONFIG_FUND: 'false'
          NPM_CONFIG_AUDIT: 'false'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          android-sdk-level: 35
          ndk: '27.1.12297006'
          ndk-version: '27.1.12297006'
          cmdline-tools-version: '12.0'
          accept-android-sdk-license: true
          cache-level: 'gradle'

      - name: Setup environment variables
        run: |
          echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
          echo "ANDROID_NDK_HOME=$ANDROID_NDK_HOME" >> $GITHUB_ENV
          echo "ANDROID_NDK_ROOT=$ANDROID_NDK_HOME" >> $GITHUB_ENV
          echo "JAVA_HOME=$JAVA_HOME" >> $GITHUB_ENV
          echo "PATH=$PATH:$ANDROID_SDK_ROOT/cmdline-tools/latest/bin:$ANDROID_SDK_ROOT/platform-tools:$ANDROID_SDK_ROOT/build-tools/35.0.0" >> $GITHUB_ENV

      - name: Prebuild native Android project
        working-directory: apps/mobile
        run: |
          pnpm exec expo prebuild --no-install --clean
        env:
          APP_VARIANT: ${{ github.event_name == 'workflow_dispatch' && inputs.variant || 'release' }}

      - name: Build APK with Gradle
        working-directory: apps/mobile/android
        run: |
          chmod +x gradlew
          ./gradlew assemble${{ github.event_name == 'workflow_dispatch' && inputs.variant || 'release' }} --no-daemon --stacktrace
        env:
          APP_VARIANT: ${{ github.event_name == 'workflow_dispatch' && inputs.variant || 'release' }}
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
          ANDROID_SDK_ROOT: ${{ env.ANDROID_SDK_ROOT }}
          JAVA_HOME: ${{ env.JAVA_HOME }}

      - name: Find built APK
        id: apk
        run: |
          APK_DIR="apps/mobile/android/app/build/outputs/apk"
          if [[ "${{ github.event_name == 'workflow_dispatch' && inputs.variant || 'release' }}" == "release" ]]; then
            APK_PATH=$(find $APK_DIR -name "*release*.apk" -type f | head -n 1)
          else
            APK_PATH=$(find $APK_DIR -name "*debug*.apk" -type f | head -n 1)
          fi

          if [[ -z "$APK_PATH" ]]; then
            echo "No APK found in $APK_DIR"
            ls -la $APK_DIR || true
            find $APK_DIR -type f || true
            exit 1
          fi

          echo "apk_path=$APK_PATH" >> $GITHUB_OUTPUT
          echo "Found APK: $APK_PATH"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: karakeep-android-${{ github.event_name == 'workflow_dispatch' && inputs.variant || 'release' }}
          path: ${{ steps.apk.outputs.apk_path }}
          retention-days: 30

      - name: Create GitHub Release (tagged push only)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: ${{ steps.apk.outputs.apk_path }}
          generate_release_notes: true
          tag_name: ${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build summary
        run: |
          echo "✅ Android build completed successfully!"
          echo "📱 APK: ${{ steps.apk.outputs.apk_path }}"
          echo "⬆️ Artifact uploaded as: karakeep-android-${{ github.event_name == 'workflow_dispatch' && inputs.variant || 'release' }}"
